<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up • 100 Days 100 Web Projects</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");

      :root {
        --primary: #6366f1;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", system-ui, sans-serif;
        min-height: 100vh;
        overflow-x: hidden;
        background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
        color: #e2e8f0;
        position: relative;
      }

      /* Animated Background */
      #bg-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        opacity: 0.6;
      }

      .glass-card {
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(148, 163, 184, 0.15);
        border-radius: 24px;
        box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
      }

      .hero-title {
        font-size: clamp(2.2rem, 6vw, 3.5rem);
        font-weight: 800;
        line-height: 1.1;
        background: linear-gradient(90deg, #a5b4fc, #c4d0ff, #818cf8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .form-floating-custom {
        position: relative;
        margin-bottom: 1.5rem;
      }

      .form-floating-custom input {
        background: rgba(15, 23, 42, 0.7) !important;
        border: 2px solid #334155;
        border-radius: 14px;
        padding: 1rem 1rem 0.5rem 3rem;
        color: #e2e8f0;
        font-size: 1rem;
        transition: all 0.3s ease;
        width: 100%;
      }

      .form-floating-custom input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        outline: none;
      }

      .form-floating-custom label {
        position: absolute;
        left: 3rem;
        top: 1.1rem;
        color: #64748b;
        transition: all 0.3s ease;
        pointer-events: none;
        font-size: 1rem;
      }

      .form-floating-custom input:focus + label,
      .form-floating-custom input:not(:placeholder-shown) + label {
        top: 0.4rem;
        font-size: 0.75rem;
        color: var(--primary);
      }

      .input-icon {
        position: absolute;
        left: 1.25rem;
        top: 1.1rem;
        color: #64748b;
        z-index: 5;
        transition: all 0.3s ease;
      }

      .form-floating-custom input:focus ~ .input-icon {
        color: var(--primary);
      }

      .password-toggle {
        position: absolute;
        right: 1.25rem;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #64748b;
        z-index: 10;
      }

      .strength-meter {
        height: 6px;
        background: #334155;
        border-radius: 9999px;
        overflow: hidden;
        margin-top: 8px;
      }

      .strength-bar {
        height: 100%;
        width: 0%;
        transition: all 0.4s ease;
        border-radius: 9999px;
      }

      .btn-signup {
        background: linear-gradient(135deg, #6366f1, #4f46e5);
        border: none;
        padding: 14px 32px;
        font-weight: 600;
        border-radius: 14px;
        transition: all 0.3s ease;
      }

      .btn-signup:hover {
        transform: translateY(-3px);
        box-shadow: 0 20px 25px -5px rgb(99 102 241 / 0.3);
      }

      .google-btn {
        background: #fff;
        color: #1e2937;
        border: 2px solid #e2e8f0;
      }

      .toast-container {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 9999;
      }

      /* Fix for OR divider */
      .divider {
        color: #64748b;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <!-- Background Canvas -->
    <canvas id="bg-canvas"></canvas>

    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-6 col-md-9">
          <!-- Hero -->
          <div class="text-center mb-5">
            <h1 class="hero-title mb-3">Join the Journey</h1>
            <p
              class="lead text-light opacity-75"
              style="max-width: 460px; margin: 0 auto"
            >
              Create your free account and unlock 100+ creative web experiments
              designed to inspire, teach, and push your frontend skills to the
              next level.
            </p>
          </div>

          <!-- Sign Up Card -->
          <div class="glass-card p-5 p-md-5">
            <h2 class="h3 text-center mb-4 fw-semibold">Create Account</h2>

            <div id="statusMsg" class="alert d-none"></div>

            <form id="signupForm" novalidate>
              <!-- Name -->
              <div class="form-floating-custom">
                <i class="fa-solid fa-user input-icon"></i>
                <input
                  type="text"
                  id="name"
                  class="form-control"
                  placeholder=" "
                  required
                />
                <label for="name">Full Name</label>
              </div>

              <!-- Username -->
              <div class="form-floating-custom">
                <i class="fa-solid fa-at input-icon"></i>
                <input
                  type="text"
                  id="username"
                  class="form-control"
                  placeholder=" "
                  required
                />
                <label for="username">Username</label>
              </div>

              <!-- Email -->
              <div class="form-floating-custom">
                <i class="fa-solid fa-envelope input-icon"></i>
                <input
                  type="email"
                  id="email"
                  class="form-control"
                  placeholder=" "
                  required
                />
                <label for="email">Email Address</label>
              </div>

              

              <!-- Password -->
              <div class="form-floating-custom">
                <i class="fa-solid fa-lock input-icon"></i>
                <input
                  type="password"
                  id="password"
                  class="form-control"
                  placeholder=" "
                  required
                />
                <label for="password">Password</label>
                <span class="password-toggle" id="togglePassword">
                  <i class="fa-solid fa-eye"></i>
                </span>
                <div class="strength-meter mt-2">
                  <div id="strengthBar" class="strength-bar"></div>
                </div>
                <small id="strengthText" class="text-muted"></small>
              </div>

              <!-- Confirm Password -->
              <div class="form-floating-custom">
                <i class="fa-solid fa-lock input-icon"></i>
                <input
                  type="password"
                  id="confirmPassword"
                  class="form-control"
                  placeholder=" "
                  required
                />
                <label for="confirmPassword">Confirm Password</label>
              </div>

              <button
                type="submit"
                id="submitBtn"
                class="btn btn-signup text-white w-100 d-flex align-items-center justify-content-center gap-2"
              >
                <span id="btnText">Create Account</span>
                <span
                  id="spinner"
                  class="spinner-border spinner-border-sm d-none"
                  role="status"
                ></span>
              </button>
            </form>

            <div class="d-flex align-items-center my-4">
              <hr class="flex-grow-1 border-secondary" />
              <span class="px-4 divider">OR</span>
              <hr class="flex-grow-1 border-secondary" />
            </div>

            <button
              id="googleBtn"
              class="google-btn btn w-100 d-flex align-items-center justify-content-center gap-3 py-3"
            >
              <i class="fa-brands fa-google"></i>
              <span>Continue with Google</span>
            </button>

            <p class="text-center mt-4 text-light opacity-75">
              Already have an account?
              <a
                href="Login.html"
                class="text-decoration-none fw-medium"
                style="color: #a5b4fc"
                >Sign in</a
              >
            </p>
          </div>
        </div>
      </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // Canvas Background Animation
      function createBackground() {
        const canvas = document.getElementById("bg-canvas");
        const ctx = canvas.getContext("2d");

        function resize() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener("resize", resize);

        let particles = [];

        class Particle {
          constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 3 + 1;
            this.speedX = Math.random() * 0.5 - 0.25;
            this.speedY = Math.random() * 0.5 - 0.25;
          }

          update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
            if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
          }

          draw() {
            ctx.fillStyle = "rgba(165, 180, 252, 0.6)";
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        function init() {
          particles = [];
          for (let i = 0; i < 80; i++) particles.push(new Particle());
        }

        function animate() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          particles.forEach((p) => {
            p.update();
            p.draw();
          });
          requestAnimationFrame(animate);
        }

        init();
        animate();
      }

      // Toast
      function showToast(message, type = "success") {
        const container = document.querySelector(".toast-container");
        const toast = document.createElement("div");
        toast.className = `toast align-items-center text-white bg-${type === "success" ? "success" : "danger"} border-0`;
        toast.innerHTML = `
                <div class="d-flex">
                    <div class="toast-body">${message}</div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                </div>
            `;
        container.appendChild(toast);
        new bootstrap.Toast(toast, { delay: 4000 }).show();
      }

      // Password Strength
      function checkPasswordStrength(password) {
        const bar = document.getElementById("strengthBar");
        const text = document.getElementById("strengthText");

        let score = 0;
        if (password.length >= 6) score++;
        if (/[A-Z]/.test(password)) score++;
        if (/[0-9]/.test(password)) score++;
        if (/[!@#$%^&*]/.test(password)) score++;

        const width = score * 25;
        let color = "#ef4444";
        if (score === 2) color = "#eab308";
        else if (score === 3) color = "#22c55e";
        else if (score === 4) color = "#10b981";

        bar.style.width = width + "%";
        bar.style.background = color;

        if (password.length === 0) {
          text.textContent = "";
          bar.style.width = "0%";
        } else if (score < 3) text.textContent = "Weak";
        else if (score === 3) text.textContent = "Good";
        else text.textContent = "Strong";
      }

      // Toggle Password
      function togglePasswordVisibility() {
        const pass = document.getElementById("password");
        const icon = document
          .getElementById("togglePassword")
          .querySelector("i");

        if (pass.type === "password") {
          pass.type = "text";
          icon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
          pass.type = "password";
          icon.classList.replace("fa-eye-slash", "fa-eye");
        }
      }

      // Form Validation
      function validateForm() {
        let valid = true;
        const name = document.getElementById("name");
        const username = document.getElementById("username");
        const email = document.getElementById("email");
        const password = document.getElementById("password");
        const confirm = document.getElementById("confirmPassword");

        [name, username, email, password, confirm].forEach((el) =>
          el.classList.remove("is-invalid"),
        );

        if (name.value.trim().length < 3) {
          name.classList.add("is-invalid");
          valid = false;
        }
        if (username.value.trim().length < 4 || /\s/.test(username.value)) {
          username.classList.add("is-invalid");
          valid = false;
        }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)) {
          email.classList.add("is-invalid");
          valid = false;
        }

        const passVal = password.value;
        if (
          passVal.length < 6 ||
          !/[A-Z]/.test(passVal) ||
          !/[0-9]/.test(passVal) ||
          !/[!@#$%^&*]/.test(passVal)
        ) {
          password.classList.add("is-invalid");
          valid = false;
        }
        if (passVal !== confirm.value) {
          confirm.classList.add("is-invalid");
          valid = false;
        }

        return valid;
      }

      // Initialize
      window.onload = function () {
        createBackground();

        const sessionHelper = window.AuthSession;
        const sessionData = sessionHelper?.persistAuthSession
          ? sessionHelper.persistAuthSession(
              {
                username,
                name,
                email,
              },
              "password",
              "signup"
            )
          : {
              username,
              name,
              email,
              authAction: "signup",
            };

        localStorage.setItem("loggedInUser", sessionData.username || username);
        localStorage.setItem(
          "loggedInUserData",
          JSON.stringify({
            ...sessionData,
            username: sessionData.username || username,
            name: sessionData.name || name,
            email: sessionData.email || email,
            provider: sessionData.provider || "password",
            authAction: sessionData.authAction || "signup",
            loginTime: sessionData.loginTime || Date.now(),
            timezone: sessionData.timezone || "Asia/Kolkata",
          })
        );

          showToast("Signup successful!", "success");

          // Delay redirect slightly for premium toast visibility
          setTimeout(() => {
            window.location.href = "../index.html";
          }, 1200);
        });
      };
    </script>
  </body>
</html>
