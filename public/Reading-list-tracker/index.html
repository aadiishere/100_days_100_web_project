<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading List Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container py-4">

    <h1 class="text-center mb-4">📚 Reading List Tracker</h1>

    <div class="card p-3 mb-4">

        <div class="row g-3">

            <div class="col-md-4">
                <input type="text" id="title" class="form-control" placeholder="Book Title">
            </div>

            <div class="col-md-3">
                <input type="text" id="author" class="form-control" placeholder="Author">
            </div>

            <div class="col-md-2">
                <input type="text" id="genre" class="form-control" placeholder="Genre">
            </div>

            <div class="col-md-3">
                <select id="status" class="form-select">
                    <option>To Read</option>
                    <option>Reading</option>
                    <option>Completed</option>
                </select>
            </div>

            <div class="col-md-9">
                <input
                    type="range"
                    id="progress"
                    class="form-range"
                    min="0"
                    max="100"
                    value="0">
            </div>

            <div class="col-md-3">
                <button class="btn btn-primary w-100" onclick="addBook()">
                    Add Book
                </button>
            </div>

        </div>
    </div>

    <div class="card p-3 mb-4">

        <div class="row">

            <div class="col-md-4">
                <input
                    type="text"
                    id="search"
                    class="form-control"
                    placeholder="Search Books">
            </div>

            <div class="col-md-4">
                <select id="filterStatus" class="form-select">
                    <option value="">All Status</option>
                    <option value="To Read">To Read</option>
                    <option value="Reading">Reading</option>
                    <option value="Completed">Completed</option>
                </select>
            </div>

            <div class="col-md-4">
                <input
                    type="text"
                    id="filterGenre"
                    class="form-control"
                    placeholder="Filter Genre">
            </div>

        </div>
    </div>

    <div class="row text-center mb-4">

        <div class="col-md-4">
            <div class="stat-card">
                <h4 id="totalBooks">0</h4>
                <p>Total Books</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="stat-card">
                <h4 id="completedBooks">0</h4>
                <p>Completed</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="stat-card">
                <h4 id="goalProgress">0%</h4>
                <p>Reading Goal</p>
            </div>
        </div>

    </div>

    <div id="bookList" class="row"></div>

</div>

<script src="script.js"></script>

</body>
</html>
