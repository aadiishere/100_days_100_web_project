<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login • 100 Days 100 Web Projects</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");

      :root {
        --primary: #6366f1;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", system-ui, sans-serif;
        min-height: 100vh;
        overflow-x: hidden;
        background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
        color: #e2e8f0;
        position: relative;
      }

      #bg-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        opacity: 0.65;
      }

      .glass-card {
        background: rgba(15, 23, 42, 0.88);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 24px;
        box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.45);
      }

      .hero-title {
        font-size: clamp(2rem, 5.5vw, 3.2rem);
        font-weight: 800;
        line-height: 1.1;
        background: linear-gradient(90deg, #a5b4fc, #c4d0ff, #818cf8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .hero-subtitle {
        font-size: 1.1rem;
        color: #94a3b8;
        max-width: 420px;
        margin: 0 auto;
      }

      .form-floating-custom {
        position: relative;
        margin-bottom: 1.5rem;
      }

      .form-floating-custom input {
        background: rgba(15, 23, 42, 0.75) !important;
        border: 2px solid #334155;
        border-radius: 14px;
        padding: 1rem 1rem 0.5rem 3rem;
        color: #e2e8f0;
        font-size: 1rem;
        transition: all 0.3s ease;
      }

      .form-floating-custom input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
      }

      .form-floating-custom label {
        position: absolute;
        left: 3rem;
        top: 1.1rem;
        color: #64748b;
        transition: all 0.3s ease;
        pointer-events: none;
        font-size: 1rem;
      }

      .form-floating-custom input:focus + label,
      .form-floating-custom input:not(:placeholder-shown) + label {
        top: 0.4rem;
        font-size: 0.78rem;
        color: var(--primary);
      }

      .input-icon {
        position: absolute;
        left: 1.25rem;
        top: 1.1rem;
        color: #64748b;
        z-index: 5;
      }

      .form-floating-custom input:focus ~ .input-icon {
        color: var(--primary);
      }

      .password-toggle {
        position: absolute;
        right: 1.25rem;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #64748b;
        font-size: 1.1rem;
      }

      .btn-login {
        background: linear-gradient(135deg, #6366f1, #4f46e5);
        border: none;
        padding: 14px;
        font-weight: 600;
        border-radius: 14px;
        font-size: 1.05rem;
        transition: all 0.3s ease;
      }

      .btn-login:hover {
        transform: translateY(-3px);
        box-shadow: 0 20px 25px -5px rgb(99 102 241 / 0.35);
      }

      .social-btn {
        font-weight: 500;
        border: 2px solid #e2e8f0;
        transition: all 0.3s ease;
      }

      .google-btn {
        background: #fff;
        color: #db4437;
      }

      .facebook-btn {
        background: #fff;
        color: #1877f2;
      }

      .divider-text {
        color: #cbd5e1;
        font-size: 0.95rem;
        font-weight: 500;
      }

      .toast-container {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 9999;
      }
    </style>
  </head>
  <body>
    <canvas id="bg-canvas"></canvas>

    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-6 col-md-9">
          <!-- Hero Section -->
          <div class="text-center mb-5">
            <h1 class="hero-title">100 Days 100 Web Projects</h1>
            <p class="hero-subtitle mt-3">
              Continue your creative journey. Log in to access 100+ hands-on web
              experiments.
            </p>
          </div>

          <!-- Login Card -->
          <div class="glass-card p-5">
            <h2 class="h3 text-center mb-4 fw-semibold">Welcome Back</h2>

            <form id="loginForm" novalidate>
              <!-- Username -->
              <div class="form-floating-custom">
                <i class="fa-solid fa-user input-icon"></i>
                <input
                  type="text"
                  id="username"
                  class="form-control"
                  placeholder=" "
                  required
                />
                <label for="username">Username</label>
              </div>

              <!-- Email (New Field) -->
              <div class="form-floating-custom">
                <i class="fa-solid fa-envelope input-icon"></i>
                <input
                  type="email"
                  id="email"
                  class="form-control"
                  placeholder=" "
                />
                <label for="email">Email (Optional)</label>
              </div>

              <!-- Password -->
              <div class="form-floating-custom">
                <i class="fa-solid fa-lock input-icon"></i>
                <input
                  type="password"
                  id="password"
                  class="form-control"
                  placeholder=" "
                  required
                />
                <label for="password">Password</label>
                <span class="password-toggle" id="togglePassword">
                  <i class="fa-solid fa-eye"></i>
                </span>
              </div>

              <div class="d-flex justify-content-end mb-3">
                <a
                  href="./ForgotPassword.html"
                  class="text-decoration-none small"
                  style="color: #a5b4fc"
                >
                  Forgot Password?
                </a>
              </div>

              <button
                type="submit"
                id="submitBtn"
                class="btn btn-login text-white w-100 d-flex align-items-center justify-content-center gap-2"
              >
                <span id="btnText">Login Now</span>
                <span
                  id="spinner"
                  class="spinner-border spinner-border-sm d-none"
                  role="status"
                ></span>
              </button>
            </form>

            <div class="d-flex align-items-center my-4">
              <hr class="flex-grow-1 border-secondary" />
              <span class="px-4 divider-text">OR CONTINUE WITH</span>
              <hr class="flex-grow-1 border-secondary" />
            </div>

            <!-- Social Buttons in One Row -->
            <div class="row g-3">
              <div class="col-6">
                <button
                  id="googleBtn"
                  class="social-btn google-btn btn w-100 d-flex align-items-center justify-content-center gap-2 py-3"
                >
                  <i class="fa-brands fa-google"></i>
                  <span>Google</span>
                </button>
              </div>
              <div class="col-6">
                <button
                  id="facebookBtn"
                  class="social-btn facebook-btn btn w-100 d-flex align-items-center justify-content-center gap-2 py-3"
                >
                  <i class="fa-brands fa-facebook-f"></i>
                  <span>Facebook</span>
                </button>
              </div>
            </div>

            <p class="text-center mt-4 text-light opacity-75">
              New here?
              <a href="./SignUp.html" class="fw-medium" style="color: #a5b4fc"
                >Create an account</a
              >
            </p>
          </div>
        </div>
      </div>
    </div>

    <div class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // Background Animation
      function createBackground() {
        const canvas = document.getElementById("bg-canvas");
        const ctx = canvas.getContext("2d");

        function resize() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener("resize", resize);

        let particles = [];
        class Particle {
          constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 3 + 1;
            this.speedX = Math.random() * 0.5 - 0.25;
            this.speedY = Math.random() * 0.5 - 0.25;
          }
          update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
            if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
          }
          draw() {
            ctx.fillStyle = "rgba(165, 180, 252, 0.65)";
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        function init() {
          particles = [];
          for (let i = 0; i < 85; i++) particles.push(new Particle());
        }

        function animate() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          particles.forEach((p) => {
            p.update();
            p.draw();
          });
          requestAnimationFrame(animate);
        }

        init();
        animate();
      }

      // Toast
      function showToast(message, type = "success") {
        const container = document.querySelector(".toast-container");
        const toast = document.createElement("div");
        toast.className = `toast align-items-center text-white bg-${type === "success" ? "success" : type === "info" ? "info" : "danger"} border-0`;
        toast.innerHTML = `
                <div class="d-flex">
                    <div class="toast-body">${message}</div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                </div>
            `;
        container.appendChild(toast);
        new bootstrap.Toast(toast, { delay: 4000 }).show();
      }

      // Password Toggle
      function togglePasswordVisibility() {
        const pass = document.getElementById("password");
        const icon = document
          .getElementById("togglePassword")
          .querySelector("i");
        if (pass.type === "password") {
          pass.type = "text";
          icon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
          pass.type = "password";
          icon.classList.replace("fa-eye-slash", "fa-eye");
        }
      }

      // Form Logic
      function initForm() {
        const form = document.getElementById("loginForm");
        const submitBtn = document.getElementById("submitBtn");
        const btnText = document.getElementById("btnText");
        const spinner = document.getElementById("spinner");

        document
          .getElementById("togglePassword")
          .addEventListener("click", togglePasswordVisibility);

        form.addEventListener("submit", (e) => {
          e.preventDefault();

          const username = document.getElementById("username").value.trim();
          const password = document.getElementById("password").value.trim();

          if (!username || !password) {
            showToast("Please fill in all required fields", "danger");
            return;
          }

          btnText.classList.add("d-none");
          spinner.classList.remove("d-none");
          submitBtn.disabled = true;

          setTimeout(() => {
            const stored = localStorage.getItem(username);
            if (!stored) {
              showToast("Account not found. Please sign up.", "danger");
            } else {
              try {
                const userData = JSON.parse(stored);
                if (password === userData.password) {
                  showToast("Login successful! Welcome back 🎉", "success");
                  localStorage.setItem("loggedInUser", username);
                  localStorage.setItem(
                    "loggedInUserData",
                    JSON.stringify({
                      username,
                      name: userData.name || username,
                      email: userData.email || "",
                      loginTime: Date.now(),
                    }),
                  );
                  setTimeout(
                    () => (window.location.href = "../index.html"),
                    1400,
                  );
                } else {
                  showToast("Incorrect password", "danger");
                }
              } catch (err) {
                showToast("Something went wrong", "danger");
              }
            }

            btnText.classList.remove("d-none");
            spinner.classList.add("d-none");
            submitBtn.disabled = false;
          }, 1500);
        });

        // Social Buttons
        document
          .getElementById("googleBtn")
          .addEventListener("click", () =>
            showToast("Google login coming soon!", "info"),
          );
        document
          .getElementById("facebookBtn")
          .addEventListener("click", () =>
            showToast("Facebook login coming soon!", "info"),
          );
      }

        // Login successful
        showToast("Login successful!", "success");

        const sessionHelper = window.AuthSession;
        const sessionData = sessionHelper?.persistAuthSession
          ? sessionHelper.persistAuthSession(
              {
                username,
                name: userData.name || username,
                email: userData.email || "",
              },
              "password",
              "login"
            )
          : {
              username,
              name: userData.name || username,
              email: userData.email || "",
              authAction: "login",
            };

        localStorage.setItem("loggedInUser", sessionData.username || username);
        localStorage.setItem(
          "loggedInUserData",
          JSON.stringify({
            ...sessionData,
            username: sessionData.username || username,
            name: sessionData.name || userData.name || username,
            email: sessionData.email || userData.email || "",
            provider: sessionData.provider || "password",
            authAction: sessionData.authAction || "login",
            loginTime: sessionData.loginTime || Date.now(),
            timezone: sessionData.timezone || "Asia/Kolkata",
          })
        );

        // Disable the button to prevent double-submit
        document.getElementById("loginBtn").disabled = true;

               // Redirect after a short delay so the user sees the success message
        setTimeout(function () {
          window.location.href = "../index.html";
        }, 1000);
      });
  </script>

  <script type="module" src="./firebase-auth.js"></script>
</body>
</html>
