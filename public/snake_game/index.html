<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#050a05">
  <title>SNAKE GAME</title>
  <link rel="stylesheet" href="./style.css?v=2" />
</head>
<body>
  <!-- Back Button -->
  <a href="/" class="project-back-button">← Back to Home</a>
  <!-- Theme Toggle -->
  <button id="themeToggle" class="theme-btn">🌙 Dark Mode</button>
  
  <!-- Main Game Container -->
  <main class="game-shell">
    <!-- HUD: Statistics -->
    <div class="hud">
      <div class="stat-box">
        <span class="stat-label">Score</span>
        <div class="stat-value" id="score">0</div>
      </div>
      <div class="stat-box">
        <span class="stat-label">High Score</span>
        <div class="stat-value" id="highscore">0</div>
      </div>
      <div class="stat-box">
        <span class="stat-label">Level</span>
        <div class="stat-value" id="level">1</div>
      </div>
    </div>

    <!-- Canvas Wrapper -->
    <div class="canvas-wrapper">
      <canvas id="gameCanvas"></canvas>
      <div id="scanline"></div>

      <!-- Start Overlay -->
      <div class="overlay" id="startOverlay">
        <div class="overlay-title">READY</div>
        <div class="overlay-sub">GUIDE THE SNAKE<br>CONSUME. GROW. SURVIVE.</div>
        <button class="btn primary" id="startBtn"><span>START GAME</span></button>
        <div class="controls-hint">
          <div class="key"><span class="key-symbol">W</span>UP</div>
          <div class="key"><span class="key-symbol">A</span>LEFT</div>
          <div class="key"><span class="key-symbol">S</span>DOWN</div>
          <div class="key"><span class="key-symbol">D</span>RIGHT</div>
          <div class="key"><span class="key-symbol">↑↓←→</span>ARROWS</div>
          <div class="key"><span class="key-symbol">P</span>PAUSE</div>
        </div>
      </div>

      <!-- Game Over Overlay -->
      <div class="overlay hidden" id="gameOverOverlay">
        <div class="overlay-title">GAME OVER</div>
        <div class="game-over-score" id="finalScore"></div>
        <button class="btn primary" id="restartBtn"><span>PLAY AGAIN</span></button>
      </div>

      <!-- Pause Overlay -->
      <div class="overlay hidden" id="pauseOverlay">
        <div class="overlay-title">PAUSED</div>
        <div class="overlay-sub">PRESS <kbd>P</kbd> TO RESUME</div>
      </div>
    </div>
  </main>

  <!-- Mobile Controls -->
  <div class="mobile-controls" id="mobileControls">
    <div class="dpad">
      <div class="dpad-row top-row">
        <button class="dpad-btn" aria-label="Move Up" data-dir="up">▲</button>
      </div>
      <div class="dpad-row bottom-row">
        <button class="dpad-btn" aria-label="Move Left" data-dir="left">◀</button>
        <button class="dpad-btn" aria-label="Move Down" data-dir="down">▼</button>
        <button class="dpad-btn" aria-label="Move Right" data-dir="right">▶</button>
      </div>
    </div>
  </div>

  <!-- Audio Assets -->
  <audio id="eatSound" src="./assets/eat.mp3" preload="auto"></audio>
  <audio id="gameOverSound" src="./assets/gameover.mp3" preload="auto"></audio>

  <!-- Script -->
  <script src="./script.js?v=2"></script>
</body>
</html>
